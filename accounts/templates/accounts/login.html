{% extends 'portfolio/layout.html' %}

{% block content %}

<h2>Login</h2>

<form method="post">
    {% csrf_token %}

    <p>Username: <input type="text" name="username"></p>
    <p>Password: <input type="password" name="password"></p>

    <input type="submit" value="Login">
</form>

{% if mensagem %}
    <p>{{ mensagem }}</p>
{% endif %}

<a href="{% url 'registo' %}">
    <button>Criar conta</button>
</a>

{% endblock %}
