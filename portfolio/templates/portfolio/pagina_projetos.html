{% extends 'portfolio/layout.html' %}

{% block content %}

<h2>Projetos</h2>
{% if gestor %}
<a href="{% url 'projeto' %}">
    <button>Criar novo projeto</button>
</a>
{% endif %}

<ul>
{% for projeto in projetos %}
    <li>
        <a href="{% url 'pagina_projeto' projeto.id %}">
            {{ projeto.titulo }}
        </a>
    </li>
{% endfor %}
</ul>

{% endblock %}
